name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build both Fabric targets
        run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: SkyHUD
          path: |
            versions/mc26_1_2/build/libs/SkyHUD-*.jar
            versions/mc26_2/build/libs/SkyHUD-*.jar
          if-no-files-found: error
