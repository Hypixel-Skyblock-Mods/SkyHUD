name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    env:
      MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      MODRINTH_CHANGELOG: "Release notes: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

    steps:
      - uses: actions/checkout@v4

      - name: Validate release tag and publishing configuration
        shell: bash
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF_NAME#v}"
          gradle_version="$(sed -nE 's/^[[:space:]]*version = "([^"]+)"/\1/p' build.gradle.kts | head -n 1)"

          if [[ -z "$gradle_version" || "$tag_version" != "$gradle_version" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} must match the Gradle version v${gradle_version}."
            exit 1
          fi

          if [[ -z "$MODRINTH_PROJECT_ID" ]]; then
            echo "::error::Repository variable MODRINTH_PROJECT_ID is not configured."
            exit 1
          fi

          if [[ -z "$MODRINTH_TOKEN" ]]; then
            echo "::error::Repository secret MODRINTH_TOKEN is not configured."
            exit 1
          fi

          echo "VERSION=$tag_version" >> "$GITHUB_ENV"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@v4

      - name: Check existing Modrinth versions
        id: modrinth
        shell: bash
        run: |
          set -euo pipefail

          versions_file="$RUNNER_TEMP/modrinth-versions.json"
          curl --fail-with-body --silent --show-error \
            --header "Authorization: $MODRINTH_TOKEN" \
            --header "User-Agent: Hypixel-Skyblock-Mods/SkyHUD GitHub Actions" \
            "https://api.modrinth.com/v2/project/$MODRINTH_PROJECT_ID/version" \
            --output "$versions_file"

          for target in "mc26_1_2:${VERSION}+mc26.1.2" "mc26_2:${VERSION}+mc26.2"; do
            key="${target%%:*}"
            version="${target#*:}"
            if jq --exit-status --arg version "$version" \
              'any(.[]; .version_number == $version)' "$versions_file" > /dev/null; then
              echo "publish_${key}=false" >> "$GITHUB_OUTPUT"
            else
              echo "publish_${key}=true" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Build both Fabric targets
        run: ./gradlew build --no-daemon

      - name: Publish Minecraft 26.1.2 to Modrinth
        if: steps.modrinth.outputs.publish_mc26_1_2 == 'true'
        run: ./gradlew :versions:mc26_1_2:modrinth --no-daemon

      - name: Publish Minecraft 26.2 to Modrinth
        if: steps.modrinth.outputs.publish_mc26_2 == 'true'
        run: ./gradlew :versions:mc26_2:modrinth --no-daemon

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          jar_26_1_2="versions/mc26_1_2/build/libs/SkyHUD-${VERSION}+mc26.1.2.jar"
          jar_26_2="versions/mc26_2/build/libs/SkyHUD-${VERSION}+mc26.2.jar"

          test -f "$jar_26_1_2"
          test -f "$jar_26_2"

          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$jar_26_1_2" "$jar_26_2" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$jar_26_1_2" "$jar_26_2" \
              --verify-tag \
              --generate-notes \
              --title "SkyHUD ${VERSION}"
          fi
